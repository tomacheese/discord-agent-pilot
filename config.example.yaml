guildId: '123456789012345678'
# 省略した場合は環境変数 DISCORD_TOKEN が使われる。設定するとこちらが優先される。
# discordToken: 'YOUR_BOT_TOKEN'
parentChannel:
  type: forum
  id: '234567890123456789'
allowedUserIds:
  - '345678901234567890'
workspaceRoots:
  - '/mnt/ssd/repos'
# CLAUDE_CONFIG_DIR で既定以外の値を使うセッションのみ、ここに列挙したものが許可される
# (`claude.defaultConfigDir` は常に暗黙的に許可される)。
# hostPath は /proc/<pid>/environ から取得する値と文字列比較するため、`~` はサポートされず絶対パスで指定する。
# 複数の CLAUDE_CONFIG_DIR を許可する場合は、この配列にエントリを追加し、
# compose.yaml 側にも hostPath ごとに1つ bind mount を追加する。
configDirs:
  - hostPath: '/home/user/.claude-work'
    containerPath: '/host/claude-config-work'
tmux:
  pollIntervalMs: 3000
  socketDir: '/tmp/tmux-host'
sessionResolution:
  ambiguityThresholdMs: 3000
claude:
  defaultConfigDir:
    hostPath: '/home/user/.claude' # `~` はサポートされないため絶対パスを指定する
    containerPath: '/host/claude-config'
  procRoot: '/host/proc' # compose.yaml で /proc をここにマウントするため、コンテナ自身の /proc ではなくホストの /proc を指す
