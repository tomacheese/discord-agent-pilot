services:
  bot:
    build: .
    user: '1000:1000' # ホストでtmux/Claude Codeを動かすUIDと一致させる(環境に応じて変更)
    environment:
      CONFIG_PATH: /app/config.yaml
      DB_PATH: /data/registry.db
      DISCORD_TOKEN: ${DISCORD_TOKEN}
    volumes:
      - /proc:/host/proc:ro
      - /tmp/tmux-1000:/tmp/tmux-host # ホストのtmuxソケットディレクトリ(UIDに合わせて変更)。Unixドメインソケットへのconnect()には書き込み権限が必要なため:roにしない
      - ~/.claude:/host/claude-config:ro # claude.defaultConfigDir。configDirs/defaultConfigDirのhostPath/containerPathの組ごとに1マウントが必要
      # - /home/user/.claude-work:/host/claude-config-work:ro # config.yamlのconfigDirsに追加のCLAUDE_CONFIG_DIRを許可した場合、対応するcontainerPathをこのように追加でマウントする
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/data
    security_opt:
      - apparmor:unconfined # 既定のdocker-defaultプロファイルが/proc読み取りをブロックするため必須
    restart: unless-stopped
